[build]
  command = "npm run build"
  publish = "dist"

# Optional: Set secure headers for production
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirect all paths to index.html for client-side SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
